name: Playwright Tests

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      pages: write
      id-token: write
      checks: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test

      # Publish JUnit results to GitHub Actions Dashboard
      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Test Results
          path: test-results/results.xml
          reporter: java-junit

      # Upload Playwright HTML Report
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # Upload JUnit XML Results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      # Configure GitHub Pages
      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5

      # Upload HTML Report to GitHub Pages
      - name: Upload Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      # Deploy Report to GitHub Pages
      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v4

      # Send Email Notification
      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: "Playwright Test Execution - ${{ job.status }}"

          body: |
            Hello,

            Playwright test execution has completed.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Status: ${{ job.status }}

            GitHub Actions Run:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            HTML Report:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

            Regards,
            GitHub Actions

          to: ${{ vars.RECIPIENT_EMAIL }}
          from: Ajay Automation <${{ secrets.EMAIL_USERNAME }}>